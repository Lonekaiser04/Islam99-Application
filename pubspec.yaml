name: Islam99
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0

environment:
  sdk: ^3.7.0

flutter:
  assets:
  - assets/quran.json
  - assets/names.json
  - assets/icon/quran2.png
  - assets/icon/quran.png
  - assets/icon/qr_code.jpg
  - assets/books/auradefatiha.pdf
  - assets/book/vol1.pdf
  - assets/book/vol2.pdf
  - assets/book/vol3.pdf
  - assets/book/vol4.pdf
  - assets/book/vol5.pdf
  - assets/book/vol6.pdf
  - assets/book/vol7.pdf
  - assets/book/vol8.pdf
  - assets/book/vol9.pdf
  - assets/duas.json
  - assets/sounds/tap.mp3

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: fonts/NotoNastaliqUrdu-Regular.ttf
    - family: Arabic
      fonts:
        - asset: fonts/NotoNaskhArabic-Regular.ttf
    - family: Lateef
      fonts:
        - asset: fonts/Lateef-Regular.ttf
    - family: Uthmani
      fonts:
        - asset: fonts/UthmanicHafs1Ver09.otf
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSans-Medium.ttf
    - family: Amiri
      fonts:
        - asset: fonts/Amiri-Regular.ttf
  uses-material-design: true
dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.3.0
  geolocator: ^14.0.1
  intl: ^0.20.2
  geocoding: ^4.0.0
  hijri: 3.0.0
  table_calendar: ^3.0.9
  permission_handler: ^12.0.0+1
  flutter_compass: 0.8.1
  shared_preferences: ^2.5.2
  google_fonts: ^6.1.0
  url_launcher: ^6.1.11
  device_info_plus: ^11.3.3
  package_info_plus: ^8.3.0
  share_plus: ^11.0.0 
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.1.0
  flutter_pdfview: ^1.4.0
  font_awesome_flutter: ^10.8.0
  syncfusion_flutter_pdfviewer: ^30.2.5
  vibration: ^3.1.3
  audioplayers: ^6.3.0
  sensors_plus: ^6.1.1
  shimmer: ^3.0.0
  clipboard: ^2.0.2
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0



flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/quran.png"
  adaptive_icon_foreground: "assets/icon/quran2.png"
  adaptive_icon_background: "assets/icon/quran3.png"


dev_dependencies:
  flutter_test:
    sdk: flutter

    
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0